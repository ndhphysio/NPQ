<!DOCTYPE html><html lang="zh-HK"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Northwick Park 頸痛問卷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang HK","Microsoft JhengHei",Roboto,sans-serif;
  /* CHANGED: Background color updated to a pale brown/beige */
  background:#F5F1E9; 
  color:#1c2833;      /* Keep dark text for good contrast */
  overflow-x:hidden;
}
/* ── Speech unlock overlay ── */
#speech-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(28,40,51,0.97);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:1000;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#speech-overlay .tap-icon{
  font-size:6rem;margin-bottom:1.5rem;
  animation:pulse 1.4s ease-in-out infinite;
}
#speech-overlay .tap-text{font-size:2.8rem;font-weight:bold;text-align:center;padding:0 1rem;color:#fff;}
#speech-overlay .tap-sub{font-size:1.3rem;margin-top:.8rem;opacity:.7;color:#fff;}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.18);opacity:.65}
}
/* ── No-speech banner ── */
#no-speech-banner{
  display:none;position:fixed;top:0;left:0;right:0;
  background:#e74c3c;color:#fff;text-align:center;
  padding:.7rem;font-size:1.2rem;z-index:500;
}
/* ── App container ── */
#app{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:1rem .7rem 2rem;
}
/* ── Header ── */
.header-title{font-size:1.8rem;font-weight:bold;text-align:center;margin-top:.4rem;color:#1c2833;}
.header-sub{font-size:1.1rem;text-align:center;opacity:.85;margin-top:.2rem;margin-bottom:.8rem;color:#34495e;}
/* ── Progress ── */
#progress-area{width:100%;max-width:700px;margin-bottom:1rem;}
#progress-text{font-size:1.6rem;font-weight:bold;text-align:center;margin-bottom:.5rem;color:#1c2833;}
/* Morandi progress bar bg still looks fine on beige */
#progress-bar-bg{width:100%;height:14px;background:#b0bcc6;border-radius:7px;overflow:hidden;}
#progress-bar-fill{height:100%;width:0;background:#1c2833;border-radius:7px;transition:width .4s ease;}
/* ── Question card ── */
#question-card{
  background:#fff;color:#222;border-radius:16px;
  padding:1.8rem 1.4rem 1.2rem;
  width:100%;max-width:700px;text-align:center;
  box-shadow:0 6px 20px rgba(44,62,80,.12);
  /* The grey border still provides necessary separation on the beige background */
  border: 2px solid #95a5a6;
  margin-bottom:1.5rem;
}
/* Question number as title is enlarged, instruction below is small */
#question-number{font-size:2.3rem;color:#1c2833;margin-bottom:.8rem;font-weight:bold;line-height:1.4;}
#question-text{font-size:1.4rem;font-weight:bold;line-height:1.5;color:#555;}
/* ── Button row ── */
.btn-row{
  display:flex;justify-content:center;gap:.6rem;margin-top:1.2rem;flex-wrap:wrap;
}
.card-btn{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.6rem 1.8rem;
  /* Light grey buttons still look okay, but could be adjusted if they feel too cool */
  background:#e5eaee;color:#2c3e50;border:1px solid #7f8c8d;border-radius:25px;
  font-size:1.3rem;cursor:pointer;transition:background .2s;
  -webkit-tap-highlight-color:transparent;
}
.card-btn:hover{background:#d5dbdb;}
/* ── Answers area ── */
#answers-area{
  width:100%;max-width:700px;
  display:grid;grid-template-columns:1fr;gap:.9rem;
}
/* ── Answer buttons ── */
.answer-btn{
  border:none;border-radius:14px;
  padding:1.3rem 1rem;
  font-size:1.8rem;font-weight:bold;
  color:#fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:transform .15s,opacity .15s,box-shadow .3s,filter .3s;
  box-shadow:0 5px 0 rgba(0,0,0,0.2);
  text-align:left;user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:4.5rem;
  display:flex;align-items:center;justify-content:flex-start;
  padding-left:1.5rem;
  gap:0.8rem;position:relative;
}
.answer-btn:active:not(.locked){transform:scale(.98);filter:brightness(0.9);}
.answer-btn.locked{pointer-events:none;opacity:.25;filter:grayscale(.8);}
.answer-btn.selected{
  transform:scale(1.02);opacity:1!important;filter:none!important;
  background:#1c2833!important;color:#fff!important;
  box-shadow:0 0 0 6px #1c2833,0 5px 0 rgba(0,0,0,.15);
}
.answer-btn.glow{
  animation:glowPulse .7s ease-in-out infinite alternate;
  z-index:10;transform:scale(1.02);
}
@keyframes glowPulse{
  0%{
    box-shadow:0 0 12px rgba(255,255,255,0.5),0 5px 0 rgba(0,0,0,0.2);
    filter:brightness(1.0);
  }
  100%{
    box-shadow:0 0 25px rgba(255,255,255,0.9),0 5px 0 rgba(0,0,0,0.2);
    filter:brightness(1.25);
  }
}
/* ── Result screen ── */
#result-screen{display:none;width:100%;max-width:700px;text-align:center;}
.result-card{
  background:#fff;color:#222;border-radius:16px;
  padding:2.2rem 1.6rem;
  box-shadow:0 6px 20px rgba(44,62,80,.12);
  border: 2px solid #95a5a6;
  margin-bottom:1.5rem;
}
.result-msg{font-size:1.7rem;line-height:1.9;margin-bottom:1.8rem;text-align:left;color:#222;}
.result-scores{font-size:2.6rem;font-weight:bold;color:#1c2833;}
.result-scores span{display:block;margin:.5rem 0;}
.result-credit{font-size:1.1rem;color:#566573;margin-top:1.4rem;}
#restart-btn{
  padding:1.2rem 3rem;background:#1c2833;color:#fff;
  border:none;border-radius:30px;font-size:1.8rem;font-weight:bold;
  cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15);
  transition:background .2s;
  -webkit-tap-highlight-color:transparent;
}
#restart-btn:hover{background:#2e4053;}
#quiz-area{width:100%;display:flex;flex-direction:column;align-items:center;}
@media(min-width:600px){
  #question-number{font-size:2.6rem;}
  .answer-btn{font-size:2.1rem;padding:1.5rem 1.5rem;}
  .result-msg{font-size:1.9rem;}
  .result-scores{font-size:3rem;}
}
</style>
</head>
<body>
<div id="speech-overlay">
  <div class="tap-icon">🔊</div>
  <div class="tap-text">點按以啟用語音</div>
  <div class="tap-sub">Tap to enable voice</div>
</div>
<div id="no-speech-banner">此瀏覽器不支援語音朗讀</div>
<div id="app">
  <div class="header-title">Northwick Park 頸痛問卷 (NPQ)</div>
  <div class="header-sub">新界東醫院聯網 物理治療部</div>
  <div id="quiz-area">
    <div id="progress-area">
      <div id="progress-text"></div>
      <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
    <div id="question-card">
      <div id="question-number"></div>
      <div id="question-text"></div>
      <div class="btn-row">
        <button class="card-btn" id="replay-btn">🔊 重播</button>
      </div>
    </div>
    <div id="answers-area"></div>
  </div>
  <div id="result-screen">
    <div class="result-card">
      <div class="result-msg" id="result-msg"></div>
      <div class="result-scores" id="result-scores"></div>
      <div class="result-credit">新界東醫院聯網 物理治療部製作</div>
    </div>
    <button id="restart-btn">🔄 重新開始</button>
  </div>
</div>
<script>
(function(){
  'use strict';
  /* ═══════════════════ DATA ═══════════════════ */
  var questions = [
    { id:1, text:'現在頸痛的程度', opts:['沒有頸痛','溫和','中等','很厲害','簡直不可想像'] },
    { id:2, text:'頸痛與睡眠', opts:['頸痛從不干擾我睡眠','頸痛有時會干擾我睡眠','頸痛經常會干擾我睡眠','頸痛使我每晚睡眠少於五小時','頸痛使我每晚睡眠少於兩小時'] },
    { id:3, text:'手臂在夜晚感到發麻或針刺般的情況', opts:['我在夜晚並不感到手臂發麻或有針刺般的感覺','我有時會在夜晚覺得手臂發麻或有針刺般的感覺','手臂在夜晚發麻或針刺般的感覺經常干擾我睡眠','手臂在夜晚發麻或針刺般的感覺使我每晚的睡眠時間少於五小時','我的手臂發麻或針刺般的感覺使我每晚的睡眠時間少於兩小時'] },
    { id:4, text:'每天症狀持續的時間', opts:['我的頸部和手臂整天都覺得很正常','我起床時會覺得頸部和手臂有不適的症狀，但不超過一小時','頸部和手臂不適的症狀時有時無，總共持續一至四小時','頸部和手臂不適的症狀時有時無，總共持續超過四小時','頸部和手臂不適的症狀持續不斷，整天都有'] },
    { id:5, text:'攜帶物件', opts:['我可攜帶重物（5公斤或以上）而不感到額外的痛楚','我可攜帶重物（5公斤或以上），但這令我感到額外的痛楚','痛楚令我不能攜帶重物，但若物件的重量中等（約 2-3 公斤），我便可以應付','我只可以拿起輕的物件（2公斤以下）','我甚麼東西都拿不起來'] },
    { id:6, text:'閱讀及看電視', opts:['多久都可以，沒有任何困難','如果我的姿勢適當，多久都可以','多久都可以，但會增加額外的痛楚','痛楚使我不願意地提早結束這些活動','痛楚使我根本無法閱讀及看電視'] },
    { id:7, text:'工作、家務之類', opts:['我可做平時的工作而不感到額外的痛楚','我可做平時的工作，但這使我感到額外的痛楚','痛楚使我只能做平時工作量的一半或以下','痛楚使我只能做平時工作量的四分之一或以下','痛楚使我根本無法工作'] },
    { id:8, text:'社交活動', opts:['我的社交生活正常，並不導致額外的痛楚','我的社交生活正常，但會增加痛的程度','頸痛規限了我的社交生活，但我仍可外出活動','頸痛使我的社交生活只能限於居所之內','頸痛使我沒有社交生活'] },
    { id:9, text:'駕駛', opts:['我連健康時也不駕駛','我有需要便可以駕駛，不會感到不適','我有需要便可以駕駛，但會感到不適','頸部的痛楚或僵直情況有時會限制我駕駛','頸部的痛楚或僵直情況經常限制我駕駛','頸痛症狀使我根本無法駕駛'] }
  ];

  // KOOS Subscale colors updated to match the existing differentiation but ensure good text contrast.
  // Grey, Green, Blue, Yellow, Orange, Red (softer, high contrast tones).
  var optionColors = ["#7f8c8d", "#2ecc71", "#3498db", "#f1c40f", "#e67e22", "#e74c3c"];

  /* ─── STATE ─── */
  var currentIndex = 0;
  var answers = [];
  var locked = false;
  var speechEnabled = false;
  var speechOK = ('speechSynthesis' in window);
  var repeatTimer = null;
  var speechSeqId = 0;

  /* ─── DOM REFS ─── */
  var elOverlay = document.getElementById('speech-overlay');
  var elBanner = document.getElementById('no-speech-banner');
  var elProgressTxt = document.getElementById('progress-text');
  var elProgressBar = document.getElementById('progress-bar-fill');
  var elQNum = document.getElementById('question-number');
  var elQText = document.getElementById('question-text');
  var elReplay = document.getElementById('replay-btn');
  var elAnswers = document.getElementById('answers-area');
  var elQuiz = document.getElementById('quiz-area');
  var elResult = document.getElementById('result-screen');
  var elResultMsg = document.getElementById('result-msg');
  var elResultScore = document.getElementById('result-scores');
  var elRestart = document.getElementById('restart-btn');

  /* ═══════════════════ VOICE SELECTION ═══════════════════ */
  function applyVoice(utter){
    var voices = window.speechSynthesis.getVoices();
    var zhHK = null, zhTW = null, zhAny = null;
    for(var i = 0; i < voices.length; i++){
      var lang = voices[i].lang || '';
      if(lang === 'zh-HK' && !zhHK) zhHK = voices[i];
      if(lang === 'zh-TW' && !zhTW) zhTW = voices[i];
      if(lang.indexOf('zh') === 0 && !zhAny) zhAny = voices[i];
    }
    utter.voice = zhHK || zhTW || zhAny || null;
    utter.lang = 'zh-HK';
    utter.rate = 0.85;
  }

  /* ─── HELPERS ─── */
  function clearAllGlow(){
    var btns = elAnswers.querySelectorAll('.answer-btn');
    for(var i = 0; i < btns.length; i++) btns[i].classList.remove('glow');
  }

  /* ─── REPEAT TIMER (10 Seconds) ─── */
  function startRepeatTimer(){
    stopRepeatTimer();
    repeatTimer = setTimeout(function(){
      if(!locked){
        speakSequence();
      }
    }, 10000);
  }
  function stopRepeatTimer(){
    if(repeatTimer !== null){ clearTimeout(repeatTimer); repeatTimer = null; }
  }

  /* ─── SPEECH: SEQUENCE ─── */
  function speakSequence(){
    if(!speechOK || !speechEnabled) return;
    window.speechSynthesis.cancel();
    clearAllGlow();
    stopRepeatTimer();
    speechSeqId++;
    var mySeqId = speechSeqId;
    var q = questions[currentIndex];
    
    var items = [];
    items.push({ text: q.text, buttonIndex: -1 });
    for(var i = 0; i < q.opts.length; i++){
      items.push({ text: q.opts[i], buttonIndex: i });
    }
    
    var idx = 0;
    function speakNext(){
      if(mySeqId !== speechSeqId) return;
      if(idx >= items.length || locked){
        clearAllGlow();
        if(mySeqId === speechSeqId) startRepeatTimer();
        return;
      }
      var item = items[idx];
      var utter = new SpeechSynthesisUtterance(item.text);
      applyVoice(utter);
      utter.onstart = function(){
        if(mySeqId !== speechSeqId) return;
        clearAllGlow();
        if(item.buttonIndex >= 0){
          var allBtns = elAnswers.querySelectorAll('.answer-btn');
          if(allBtns[item.buttonIndex]) allBtns[item.buttonIndex].classList.add('glow');
        }
      };
      utter.onend = function(){
        if(mySeqId !== speechSeqId) return;
        clearAllGlow();
        idx++;
        setTimeout(speakNext, 400);
      };
      utter.onerror = function(){
        if(mySeqId !== speechSeqId) return;
        clearAllGlow();
        idx++;
        setTimeout(speakNext, 400);
      };
      window.speechSynthesis.speak(utter);
    }
    speakNext();
  }

  /* ─── SPEECH: RESULT ─── */
  function speakResult(finalScore){
    if(!speechOK || !speechEnabled) return;
    window.speechSynthesis.cancel();
    stopRepeatTimer();
    speechSeqId++;
    var mySeqId = speechSeqId;
    var lines = [
      '非常感謝您完成了這份調查中所有的問題。',
      '請勿關閉此頁面，並告知您的物理治療師。',
      '您的總計分數是百分之 ' + finalScore.toFixed(1) + ' 。'
    ];
    var idx = 0;
    function speakNext(){
      if(mySeqId !== speechSeqId) return;
      if(idx >= lines.length) return;
      var utter = new SpeechSynthesisUtterance(lines[idx]);
      applyVoice(utter);
      utter.onend = function(){
        if(mySeqId !== speechSeqId) return;
        idx++;
        setTimeout(speakNext, 400);
      };
      window.speechSynthesis.speak(utter);
    }
    speakNext();
  }

  /* ─── RENDER ─── */
  function renderQuestion(){
    locked = false;
    stopRepeatTimer();
    var q = questions[currentIndex];
    var totalQs = questions.length;
    elProgressTxt.textContent = '第 ' + (currentIndex + 1) + ' / ' + totalQs + ' 部分';
    elProgressBar.style.width = ((currentIndex + 1) / totalQs * 100) + '%';
    
    // ENLARGED Question title, and Smaller Instruction.
    elQNum.textContent = q.text;
    elQText.textContent = '請選擇最貼切的一項：';
    elAnswers.innerHTML = '';
    
    for(var i = 0; i < q.opts.length; i++){
      addButton(q.opts[i], i);
    }
    
    window.scrollTo(0, 0);
    speakSequence();
  }

  function addButton(label, value){
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = label;
    
    // Apply differentiated colors. Question 9 has a special logic.
    if(currentIndex === 8){
      // For driving, first option is grey, subsequent use green -> red subscale
      btn.style.backgroundColor = optionColors[value % optionColors.length];
    } else {
      // For all other questions, start with Green (index 1) to represent 'None/No Pain'
      var colorIdx = (value + 1) % optionColors.length;
      btn.style.backgroundColor = optionColors[colorIdx === 0 ? 1 : colorIdx];
    }
    
    btn.addEventListener('click', function(){ onAnswer(btn, value); });
    elAnswers.appendChild(btn);
  }

  /* ─── ANSWER ─── */
  function onAnswer(btn, value){
    if(locked) return;
    locked = true;
    stopRepeatTimer();
    speechSeqId++;
    if(speechOK) window.speechSynthesis.cancel();
    clearAllGlow();
    
    var all = elAnswers.querySelectorAll('.answer-btn');
    for(var i = 0; i < all.length; i++) all[i].classList.add('locked');
    btn.classList.remove('locked');
    btn.classList.add('selected');
    
    // Question 9 'Does not drive' logic
    if(currentIndex === 8){
      if(value === 0){
        answers[currentIndex] = null; // Seçilen 'Do not drive', exempt.
      } else {
        answers[currentIndex] = value - 1; // Map remaining options to 0-4.
      }
    } else {
      answers[currentIndex] = value; 
    }
    
    setTimeout(function(){
      currentIndex++;
      if(currentIndex < questions.length) renderQuestion();
      else showResult();
    }, 350);
  }

  /* ─── RESULT ─── */
  function showResult(){
    stopRepeatTimer();
    speechSeqId++;
    if(speechOK) window.speechSynthesis.cancel();
    clearAllGlow();
    elQuiz.style.display = 'none';
    elResult.style.display = 'block';
    
    var totalScore = 0;
    var answeredCount = 0;
    
    for(var i = 0; i < answers.length; i++){
      if(answers[i] !== null){
        totalScore += answers[i];
        answeredCount++;
      }
    }
    
    // NPQ standard clinical scoring formula.
    var finalPercentage = answeredCount > 0 ? (totalScore / (4 * answeredCount)) * 100 : 0;
    
    elResultMsg.textContent = '非常感謝您完成了這份調查中所有的問題。請勿關閉此頁面，並告知您的物理治療師。';
    elResultScore.innerHTML = '<span>得分: ' + finalPercentage.toFixed(1) + ' %</span><small style="font-size:1.2rem; display:block; margin-top:.5rem; opacity:.7;">(已回答 ' + answeredCount + ' 題，總得分 ' + totalScore + ' 分)</small>';
    
    window.scrollTo(0, 0);
    speakResult(finalPercentage);
  }

  /* ─── RESTART ─── */
  function restart(){
    stopRepeatTimer();
    speechSeqId++;
    if(speechOK) window.speechSynthesis.cancel();
    clearAllGlow();
    startQuiz();
  }

  /* ─── INIT ─── */
  function init(){
    if(!speechOK){
      elOverlay.style.display = 'none';
      elBanner.style.display = 'block';
      startQuiz();
    } else {
      window.speechSynthesis.getVoices();
      if(typeof window.speechSynthesis.onvoiceschanged !== 'undefined'){
        window.speechSynthesis.onvoiceschanged = function(){
          window.speechSynthesis.getVoices();
        };
      }
      elOverlay.addEventListener('click', onOverlayTap);
    }
    elReplay.addEventListener('click', function(){
      stopRepeatTimer();
      speakSequence();
    });
    elRestart.addEventListener('click', restart);
  }

  function onOverlayTap(){
    speechEnabled = true;
    elOverlay.style.display = 'none';
    var dummy = new SpeechSynthesisUtterance('');
    dummy.lang = 'zh-HK';
    dummy.volume = 0;
    window.speechSynthesis.speak(dummy);
    startQuiz();
  }

  function startQuiz(){
    currentIndex = 0;
    answers = [];
    elResult.style.display = 'none';
    elQuiz.style.display = 'flex';
    renderQuestion();
  }

  init();
})();
</script>
</body></html>
